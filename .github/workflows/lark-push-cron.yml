name: Lark Base push (Salesforce/Instantly/Wix)

on:
  schedule:
    # Every 1 hour — non-critical sources (SF/Instantly/Wix)
    # SMAX has its own faster workflow (see lark-push-smax-cron.yml)
    - cron: '15 * * * *'
  workflow_dispatch:

# 2026-07-20: prevent overlapping runs from piling up on a slow DB (see
# salesforce-cron.yml). Queue instead of overlap.
concurrency:
  group: lark-push-nonsmax
  cancel-in-progress: false

jobs:
  lark-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Push data to Lark Base
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_DAYS_TO_PUSH: '365'
          LARK_SOURCES: 'salesforce,instantly,web'
        run: npm run etl:lark:push
