name: Instantly incremental poll

# 2026-07-18: Trimmed from a combined "Sync ETL Cron" that re-ran SMAX +
# Salesforce + Wix + Instantly + a score recompute every hour. SMAX, Salesforce
# and Wix each now have their own dedicated workflow driven by cron-job.org
# (7 / 15 / 30 min) — running them here too was pure duplicate Supabase egress
# while the org is over quota. Only the Instantly incremental poll is kept:
# nothing else does it (its webhook covers real-time opens/clicks, this hourly
# poll backstops any events the webhook missed). The /api/cron/sync/instantly
# endpoint also recomputes lead scores internally, so the separate recompute
# job was dropped as well (SMAX's 7-min cron recomputes constantly anyway).

on:
  schedule:
    - cron: "5 * * * *"  # hourly at HH:05 — backstop for missed webhook events
  workflow_dispatch:

concurrency:
  group: sync-etl
  cancel-in-progress: false

jobs:
  instantly-sync:
    name: Instantly incremental via Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger instantly
        run: |
          RESPONSE=$(curl -sS -w "\nHTTP_CODE:%{http_code}" --max-time 75 \
            "https://mda-cdp.vercel.app/api/cron/sync/instantly" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v 'HTTP_CODE:')
          echo "[instantly] HTTP $HTTP_CODE"
          echo "$BODY"
          [ "$HTTP_CODE" -ge 400 ] && exit 1
          echo "✅ instantly OK"
