name: Salesforce incremental sync

on:
  schedule:
    # Every 1 hour — SF has more volume + longer processing
    - cron: '0 * * * *'
  workflow_dispatch:

# 2026-07-20: SF ETL takes ~9 min normally, longer when the DB is slow. Without
# this guard, cron-job.org firing every 15 min stacked 4+ overlapping SF runs
# that each held DB connections → connection-pool exhaustion → whole DB timed
# out. Queue instead of overlap: at most one SF run at a time.
concurrency:
  group: salesforce-etl
  cancel-in-progress: false

jobs:
  sf-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Run Salesforce ETL
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SALESFORCE_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SALESFORCE_CLIENT_ID: ${{ secrets.SALESFORCE_CLIENT_ID }}
          SALESFORCE_CLIENT_SECRET: ${{ secrets.SALESFORCE_CLIENT_SECRET }}
          SALESFORCE_API_VERSION: v59.0
        run: npm run etl:sf:real
