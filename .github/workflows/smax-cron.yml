name: SMAX incremental sync

on:
  schedule:
    # Every 15 minutes — balances freshness vs Supabase free-tier Disk IO /
    # egress budget. 5-minute polling exhausted the Nano instance's IO budget
    # (2026-07-10 outage). REMINDER: cron-job.org triggers must also be set
    # to every 15 min — its workflow_dispatch calls override this schedule.
    - cron: '*/15 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Concurrency lock: SMAX ETL runs 4-5 min. If it ever exceeds 5 min (SMAX API
# slow / retries), don't spawn a second parallel run — queue it instead.
concurrency:
  group: smax-etl
  cancel-in-progress: false

jobs:
  smax-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Run SMAX ETL (incremental)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SMAX_USER_TOKEN: ${{ secrets.SMAX_USER_TOKEN }}
          SMAX_API_KEY: ${{ secrets.SMAX_API_KEY }}
          SMAX_BASE_URL: https://api.smax.ai
        run: npm run etl:smax:real
