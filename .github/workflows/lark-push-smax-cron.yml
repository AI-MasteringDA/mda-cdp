name: Lark Base push (SMAX only, fast)

on:
  schedule:
    # Every 15 minutes. REVERTED from a same-day */7 attempt (2026-07-16):
    # this job has a "full refresh" path below (deleteAllRecords + re-read all
    # ~9k leads from v_smax_lead_snapshot) that fires during the first 15 min
    # of every 6-hour UTC block (00/06/12/18:00). At */15 exactly ONE run lands
    # in that window per block. At */7, TWO-THREE runs land in it → the full
    # refresh (the most expensive thing this job does) fires 2-3x instead of
    # once, right when the Supabase org is already over its egress quota
    # (7.04GB used this billing cycle, per Dashboard → Usage, 2026-07-16).
    # smax-cron.yml (the actual SMAX->Supabase ingest) stays at */7 — its cost
    # scales down with a shorter window, no equivalent fixed-window multiplier.
    # REMINDER: cron-job.org trigger must also be set back to every 15 min.
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Concurrency lock: kept as a safety net even though real run time (~2-3.5 min)
# is well under the 7-min cadence — cheap insurance if SMAX API ever gets slow
# and a run runs long. `cancel-in-progress: false` queues the next run until
# the current finishes (safer than cancel: no half-written state in Lark).
concurrency:
  group: lark-push-smax
  cancel-in-progress: false

jobs:
  lark-push-smax:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Push SMAX data to Lark Base
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          # SMAX creds: the chat-history columns pull messages straight from
          # the SMAX API during the push (etl/lib/smax-chat.ts)
          SMAX_USER_TOKEN: ${{ secrets.SMAX_USER_TOKEN }}
          SMAX_API_KEY: ${{ secrets.SMAX_API_KEY }}
          SMAX_BASE_URL: https://api.smax.ai
          LARK_DAYS_TO_PUSH: '365'
          LARK_SOURCES: 'smax'
        run: npm run etl:lark:push
