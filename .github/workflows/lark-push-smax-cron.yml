name: Lark Base push (SMAX only, fast)

on:
  schedule:
    # Every ~7 minutes (2026-07-16, requested by user — matches smax-cron.yml).
    # Actual run time measured at ~2-3.5 min (the old "7-8 min" estimate here
    # was stale — verified against real GitHub Actions run durations before
    # bumping, since a job this short has no risk of overlapping itself at a
    # 7-min cadence). Non-SMAX sources use lark-push-cron.yml (hourly).
    # REMINDER: cron-job.org trigger must also be set to every 7 min.
    - cron: '*/7 * * * *'
  workflow_dispatch:

# Concurrency lock: kept as a safety net even though real run time (~2-3.5 min)
# is well under the 7-min cadence — cheap insurance if SMAX API ever gets slow
# and a run runs long. `cancel-in-progress: false` queues the next run until
# the current finishes (safer than cancel: no half-written state in Lark).
concurrency:
  group: lark-push-smax
  cancel-in-progress: false

jobs:
  lark-push-smax:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Push SMAX data to Lark Base
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          # SMAX creds: the chat-history columns pull messages straight from
          # the SMAX API during the push (etl/lib/smax-chat.ts)
          SMAX_USER_TOKEN: ${{ secrets.SMAX_USER_TOKEN }}
          SMAX_API_KEY: ${{ secrets.SMAX_API_KEY }}
          SMAX_BASE_URL: https://api.smax.ai
          LARK_DAYS_TO_PUSH: '365'
          LARK_SOURCES: 'smax'
        run: npm run etl:lark:push
