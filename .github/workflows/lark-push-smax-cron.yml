name: Lark Base push (SMAX only, fast)

on:
  schedule:
    # Every 15 minutes — balances freshness vs Supabase free-tier Disk IO /
    # egress budget (5-minute polling caused the 2026-07-10 IO exhaustion).
    # Non-SMAX sources use lark-push-cron.yml (hourly).
    # REMINDER: cron-job.org trigger must also be set to every 15 min.
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Concurrency lock: push takes 7-8 min but cron fires every 5 min. Without this
# lock, run N+1 starts `deleteAllRecords` while run N is still inserting, wiping
# the fresh data. `cancel-in-progress: false` queues the next run until the
# current finishes (safer than cancel: no half-written state in Lark).
concurrency:
  group: lark-push-smax
  cancel-in-progress: false

jobs:
  lark-push-smax:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Push SMAX data to Lark Base
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_DAYS_TO_PUSH: '365'
          LARK_SOURCES: 'smax'
        run: npm run etl:lark:push
