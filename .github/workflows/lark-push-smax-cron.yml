name: Lark Base push (SMAX only, fast)

on:
  schedule:
    # Every 5 minutes — SMAX pipeline needs near-real-time for Sales team.
    # Non-SMAX sources use lark-push-cron.yml (hourly).
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  lark-push-smax:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Push SMAX data to Lark Base
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_DAYS_TO_PUSH: '365'
          LARK_SOURCES: 'smax'
        run: npm run etl:lark:push
